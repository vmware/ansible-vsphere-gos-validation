---
- name: "Enable Windows optional features in guest OS"
  include_tasks: ../utils/win_enable_optional_features.yml
  vars:
    win_optional_features:
      - Microsoft-Windows-Subsystem-Linux
      - VirtualMachinePlatform

- name: "Check optional feature 'Microsoft-Windows-Subsystem-Linux' state"
  include_tasks: ../utils/win_check_optional_feature.yml
  vars:
    win_optional_feature: "Microsoft-Windows-Subsystem-Linux"

- name: "Check optional feature 'VirtualMachinePlatform' state"
  include_tasks: ../utils/win_check_optional_feature.yml
  vars:
    win_optional_feature: "VirtualMachinePlatform"

# For internal testing only
- name: "Run SkTool in guest OS"
  include_tasks: ../utils/win_run_sktool.yml
  when:
    - win_sktool_download_url is defined
    - win_sktool_download_url | length != 0

- name: "Download MSI file of the latest WSL version from github"
  include_tasks: download_latest_wsl.yml

- name: "Install WSL via downloaded MSI file in guest OS"
  ansible.windows.win_package:
    path: "{{ wsl_msi_path }}"
    state: present
    arguments: "/quiet /norestart"
    log_path: "{{ wsl_file_path_win }}\\wsl_install.log"
  delegate_to: "{{ vm_guest_ip }}"
  register: wsl_install_result

- name: "Restart guest OS after installing WSL"
  include_tasks: ../utils/win_shutdown_restart.yml
  vars:
    set_win_power_state: "restart"
    win_reboot_timeout: 1800
  when:
    - wsl_install_result.reboot_required is defined
    - wsl_install_result.reboot_required

- name: "Check if WSL installation log file exists"
  include_tasks: ../utils/win_check_file_exist.yml
  vars:
    win_check_file_exist_file: "{{ wsl_file_path_win }}\\wsl_install.log"

- name: "Fetch WSL installation log file to local"
  include_tasks: ../utils/win_get_file.yml
  vars:
    win_get_file_src_path: "{{ wsl_file_path_win }}\\wsl_install.log"
    win_get_file_dst_path: "{{ current_test_log_folder }}"
    win_get_file_ignore_error: true
  when: win_check_file_exist_result

- name: "Get installed WSL version info"
  include_tasks: ../utils/win_execute_cmd.yml
  vars:
    win_powershell_cmd: >-
      $result = wsl.exe --version;
      $clean_result = $result -replace '\u0000','';
      Write-host $clean_result
