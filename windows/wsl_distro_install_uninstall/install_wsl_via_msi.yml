---
- name: "Enable 'Virtual Machine Platform' optional feature in guest OS"
  include_tasks: ../utils/win_enable_optional_feature.yml
  vars:
    win_optional_feature: "VirtualMachinePlatform"

- name: "Download latest WSL version from github"
  include_tasks: download_latest_wsl.yml

- name: "Install WSL via downloaded MSI file in guest OS"
  ansible.windows.win_package:
    path: "{{ wsl_msi_path }}"
    state: present
    arguments: "/quiet /norestart"
    log_path: "{{ wsl_file_path_win }}\\wsl_install.log"
  delegate_to: "{{ vm_guest_ip }}"
  register: wsl_install_result

- name: "Restart guest OS after installing WSL"
  include_tasks: ../utils/win_shutdown_restart.yml
  vars:
    set_win_power_state: "restart"
    win_reboot_timeout: 1800
  when:
    - wsl_install_result.reboot_required is defined
    - wsl_install_result.reboot_required

- name: "Get installed WSL version info"
  include_tasks: ../utils/win_execute_cmd.yml
  vars:
    win_powershell_cmd: >-
      $result = wsl.exe --version;
      $clean_result = $result -replace '\u0000','';
      Write-host $clean_result
    win_execute_cmd_ignore_error: true

- name: "Get installed WSL status"
  include_tasks: ../utils/win_execute_cmd.yml
  vars:
    win_powershell_cmd: >-
      $result = wsl.exe --status;
      $clean_result = $result -replace '\u0000','';
      Write-host $clean_result
    win_execute_cmd_ignore_error: true

- name: "Install the WSL distribution"
  include_tasks: install_wsl_distro.yml
