---
- name: "Initialize the states of configured VM guest ID and whether guest OS is recognized"
  ansible.builtin.set_fact:
    current_guest_id_expected: false
    current_os_recognized: false

# VM configured guest ID is the current OS guest ID
- name: "Set fact of the current OS guest ID is the expected configured VM guest ID"
  ansible.builtin.set_fact:
    current_guest_id_expected: true
  when:
    - esxi_version is version(current_gos_info.win_guest_creation_esxi, '>=')
    - vm_hardware_version_num | int >= current_gos_info.win_guest_creation_hwv | int

# Guest OS is recognized
- name: "Set fact of the current OS fullname is the expected VM guest OS fullname"
  ansible.builtin.set_fact:
    current_os_recognized: true
  when: >
    (esxi_version is version(current_gos_info.win_guest_creation_esxi, '>=')) or
     (current_gos_info.win_guest_add_esxi is defined and
     esxi_version is version(current_gos_info.win_guest_add_esxi, '>=') and
      vmtools_version is version(current_gos_info.win_guest_vmtools, '>='))

# Set expected guest ID corresponding to the current OS version
- name: "Set fact of expected guest ID of current {{ guest_os_ansible_architecture }} OS"
  ansible.builtin.set_fact:
    current_os_guest_id: >-
      {%- if guest_os_ansible_architecture == '32-bit' -%}{{ (current_gos_info.win_guest_id | reject('match', '.*64Guest'))[0] }}
      {%- else -%}{{ (current_gos_info.win_guest_id | select('match', '.*64Guest'))[0] }}
      {%- endif -%}

# VM configured guest ID is the guest ID for the previous version of current OS
- name: "Set expected guest ID corresponding to previous OS version"
  when: not current_guest_id_expected
  block:
    - name: "Get the previous version of current OS info in the guest OS defination list"
      include_tasks: get_previous_gos_info.yml

    - name: "Set fact of expected guest ID of previous {{ guest_os_ansible_architecture }} OS"
      ansible.builtin.set_fact:
        previous_os_guest_id: >-
          {%- if guest_os_ansible_architecture == '32-bit' -%}{{ (previous_gos_info.win_guest_id | reject('match', '.*64Guest'))[0] }}
          {%- else -%}{{ (previous_gos_info.win_guest_id | select('match', '.*64Guest'))[0] }}
          {%- endif -%}

- name: "Check configured guest ID"
  ansible.builtin.assert:
    that:
      - vm_guest_id == current_os_guest_id
    fail_msg: >-
      VM configured guest ID '{{ vm_guest_id }}' should be the guest ID
      '{{ current_os_guest_id }}' for the current OS version {{ guest_os_ansible_distribution }}
      on ESXi host {{ esxi_version }} with VM hardware version {{ vm_hardware_version_num }}.
  when: current_guest_id_expected

- name: "Check configured guest ID"
  ansible.builtin.assert:
    that:
      - vm_guest_id == previous_os_guest_id
    fail_msg: >-
      VM configured guest ID '{{ vm_guest_id }}' should be the guest ID
      '{{ previous_os_guest_id }}'for the previous version of current OS {{ guest_os_ansible_distribution }}
      on ESXi host {{ esxi_version }} with VM hardware version {{ vm_hardware_version_num }}.
  when: not current_guest_id_expected

- name: "Check guest ID and fullname in VM guest info"
  ansible.builtin.assert:
    that:
      - guestinfo_guest_id == current_os_guest_id
      - guestinfo_guest_full_name in current_gos_info.win_guest_fullname
    fail_msg: >-
      VM guest ID '{{ vm_guest_id }}' and guest fullname '{{ guestinfo_guest_full_name }}' in
      VM guest info do not match the guest ID '{{ current_os_guest_id }}' and fullname
      '{{ current_gos_info.win_guest_fullname }}' for the current OS version {{ guest_os_ansible_distribution }}
      on ESXi host {{ esxi_version }} with VM hardware version {{ vm_hardware_version_num }}.
  when: >
    current_guest_id_expected or
    current_os_recognized

- name: "Check guest ID and fullname in VM guest info"
  ansible.builtin.assert:
    that:
      - guestinfo_guest_id == previous_os_guest_id
      - guestinfo_guest_full_name in previous_gos_info.win_guest_fullname
    fail_msg: >-
      VM guest ID '{{ vm_guest_id }}' and guest fullname '{{ guestinfo_guest_full_name }}' in
      VM guest info do not match the guest ID '{{ previous_os_guest_id }}' and fullname
      '{{ previous_gos_info.win_guest_fullname }}' for the previous version of current OS
      {{ guest_os_ansible_distribution }} on ESXi host {{ esxi_version }} with VM hardware version {{ vm_hardware_version_num }}.
  when:
    - not current_guest_id_expected
    - not current_os_recognized
